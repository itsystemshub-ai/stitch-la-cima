services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-zenith-app
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=zenith_erp
      - DB_USERNAME=zenith_user
      - DB_PASSWORD=zenith_pass
    depends_on:
      - db
    networks:
      - zenith-net

  db:
    image: mariadb:11
    container_name: erp-zenith-db
    restart: always
    environment:
      - MYSQL_DATABASE=zenith_erp
      - MYSQL_USER=zenith_user
      - MYSQL_PASSWORD=zenith_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - zenith-net

  redis:
    image: redis:alpine
    container_name: erp-zenith-redis
    networks:
      - zenith-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: erp-zenith-pma
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=zenith_user
      - PMA_PASSWORD=zenith_pass
    depends_on:
      - db
    networks:
      - zenith-net

networks:
  zenith-net:
    driver: bridge

volumes:
  dbdata:
