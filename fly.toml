app {
  kill_signal = "SIGINT"
  kill_timeout = 5
  processes = []

  [build]
    builder = "PACK"
    buildpack = "heroku/nodejs"

  [deploy]
    strategy = "rolling"
    max_unavailable = "25%"

  [env]
    NODE_ENV = "production"
    NPM_CONFIG_PRODUCTION = "false"
  }

  [[services]]
    http_checks = []
    internal_port = 3000
    processes = ["app"]
    protocol = "tcp"
    script_checks = []
    [services.concurrency]
      hard_limit = 25
      soft_limit = 20
      type = "connections"

    [[services.ports]]
      force_https = true
      handlers = ["http"]
      port = 80

    [[services.ports]]
      handlers = ["tls", "http"]
      port = 443

    [[services.tcp_checks]]
      grace_period = "1s"
      interval = "15s"
      restart_limit = 0
      timeout = "2s"

}
